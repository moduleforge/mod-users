# DRAFT — Cloud Run service definition for users-api.
#
# This file is a template; the IMAGE placeholder is replaced by CI on deploy.
# The service is NOT actively deployed — it documents the intended Cloud Run
# configuration for when a GCP project is available.
#
# To deploy manually:
#   gcloud run services replace deploy/cloudrun/service.yaml \
#     --region us-central1 --project $PROJECT_ID

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: users-api
  labels:
    app: users-api
  annotations:
    run.googleapis.com/description: "Users module API server"
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Auto-scaling bounds.
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        # CPU is only allocated during request processing (cost-saving).
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: IMAGE # replaced by CI — e.g. us-docker.pkg.dev/PROJECT/repo/users-api:sha
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            # Non-secret configuration.
            - name: DEPLOY_MODE
              value: cloud
            - name: SERVER_ADDR
              value: ":8080"
            - name: LOG_LEVEL
              value: info

            # Secrets — reference Cloud Secret Manager secrets.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: users-api-database-url
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: users-api-jwt-secret
                  key: latest
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: users-api-oidc-client-secret
                  key: latest

          # Startup / liveness probe.
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
