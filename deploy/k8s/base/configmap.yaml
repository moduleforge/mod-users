# DRAFT — Non-secret environment variables for users-api.
#
# Secrets (DATABASE_URL, JWT_SECRET, AUTH_PROVIDER_*_CLIENT_SECRET) belong in
# a Kubernetes Secret, not here.
#
# Auth providers use the AUTH_PROVIDER_<ID>_<FIELD> scheme (see
# api/internal/config/providers.go). Add an entry per enabled provider; for
# well-known providers (google, microsoft) only CLIENT_ID + CLIENT_SECRET are
# required.
apiVersion: v1
kind: ConfigMap
metadata:
  name: users-api-config
data:
  DEPLOY_MODE: cloud
  SERVER_ADDR: ":8080"
  LOG_LEVEL: info
  AUTH_ADMIN_ROLE: admin
  AUTH_OAUTH_REDIRECT_BASE_URL: https://api.example.com
  AUTH_FRONTEND_RETURN_URL: https://app.example.com/auth/oidc/return
  # Example provider; add more as needed.
  AUTH_PROVIDER_GOOGLE_DISPLAY_NAME: Google
  CORS_ORIGINS: ""
