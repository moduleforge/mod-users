apiVersion: moduleforge/v1
kind: App
metadata:
  name: users-app

# ============================================================
# Top-level application identity
# ============================================================

app: users-app
goModule: github.com/moduleforge/users-module/api

# output.main and output.goMod specify where mfgen writes the generated files.
# outputDir is the containing directory used by the spec; both paths point there.
outputDir: cmd/server

# ============================================================
# Modules — selected subset for this deployment.
# contacts-module and tags-module are excluded; this is a
# users/authz/audit/core-only deployment.
# ============================================================

modules:
  - path: ./core-module
    manifest: moduleforge.module.yaml
  - path: ./audit-module
    manifest: moduleforge.module.yaml
  - path: ./authz-module
    manifest: moduleforge.module.yaml
  - path: ./users-module
    manifest: moduleforge.module.yaml

# ============================================================
# Config — scalar/map values resolved via config: arg-source.
# All secrets are expected to arrive as env vars at runtime;
# the values here are defaults or documentation markers.
# ============================================================

config:
  auth:
    # AUTH_ADMIN_ROLE — role name that grants admin privileges. Default: "admin".
    adminRole: admin
    # AUTH_OAUTH_REDIRECT_BASE_URL — base URL of this API; used to build
    # the callback URI registered with each OIDC provider.
    oauthRedirectBaseURL: ""
    # AUTH_FRONTEND_RETURN_URL — GUI page the OIDC callback redirects to after
    # minting a local JWT.
    frontendReturnURL: ""
    # AUTH_REQUIRE_STEP_UP — gates credential-mutating endpoints behind a
    # step-up token. Default: false.
    requireStepUp: false
    # oidcIssuerURL / oidcClientID — empty for local-only (non-OIDC) mode.
    # Set by the per-provider registry when OIDC providers are configured.
    oidcIssuerURL: ""
    oidcClientID: ""
    # mapperStyle — JWT claim-mapper variant. "generic" handles flat email/roles.
    mapperStyle: generic
  server:
    # SERVER_ADDR — listen address. Default: ":8080".
    addr: ":8080"
    # SERVER_SHUTDOWN_TIMEOUT — graceful-shutdown budget. Default: 25s.
    shutdownTimeout: 25s
    # CORS_ORIGINS — comma-separated allowed origins.
    corsOrigins: ""
    # GUI_BASE_URL — used in email links and the setup-token banner URL.
    guiBaseURL: "http://localhost:3000"
  onboarding:
    # TOKEN_DISPLAY — controls how the OIDC onboarding setup token is surfaced.
    # Values: both | stderr | localhost | none. Default: "both".
    tokenDisplay: both
  deployMode: local

# ============================================================
# Infrastructure singletons — constructed once at startup and
# shared with every module that lists the name in requires.infra.
# ============================================================

infra:
  # cfg — top-level config struct. Loaded first; all other singletons
  # may use field: references into it.
  cfg:
    type: "*config.Config"
    constructor: config.Load
    args: []

  # pool — shared pgx connection pool. Constructed from cfg.DB (which
  # reads DB_URL, DB_MAX_CONNS, DB_MAX_CONN_LIFETIME, DB_MAX_CONN_IDLE_TIME).
  pool:
    type: "*pgxpool.Pool"
    constructor: localdb.New
    args:
      - context       # context.Context — passed to pgxpool.NewWithConfig
      - infra:cfg     # *config.Config — provides DB.URL and pool tunables

  # fieldCipher — AES-256-GCM cipher for SSN/EIN field encryption.
  # Reads CORE_FIELD_KEY_HEX from the environment at startup.
  # Fails fast if the key is missing or malformed.
  fieldCipher:
    type: "*fieldcrypto.Cipher"
    constructor: fieldcrypto.NewFromEnv
    args: []

  # logger — structured JSON logger. Injected into corehttpapi.Deps (core-module).
  # LOG_LEVEL env var controls verbosity (DEBUG|INFO|WARN|ERROR; default INFO).
  logger:
    type: "*slog.Logger"
    constructor: slog.New
    args:
      - symbol:slog.NewJSONHandler   # io.Writer + HandlerOptions resolved at generation

  # opReg — authz operation registry. Loaded from the authz_operations table
  # after migrations have seeded the rows. Must be constructed before az.
  opReg:
    type: "*authzapi.OperationRegistry"
    constructor: authzapi.NewOperationRegistry
    args:
      - context           # context.Context — startup-time DB load
      - queries:authzdb   # authzdb.New(pool) — reads authz_operations table

  # az — grants-table Authorizer. Requires opReg (built above) for SatisfiedBy
  # closure construction and wildcard-grant checks. Users-module provides its
  # own localAuthz.New via provides.services.authorizer, but authz-module's
  # service.New and core-module's service.New both declare infra:az as a
  # dependency. The app manifest therefore exposes az as a named infra singleton
  # so those modules can reference it without a circular service dependency.
  #
  # NOTE: users-module's authorizer service IS the localAuthz.Authorizer; it is
  # NOT constructed separately here. The infra:az singleton is for direct infra
  # injection into authz-module and core-module service constructors.
  az:
    type: "*localAuthz.Authorizer"
    constructor: localAuthz.New
    args:
      - queries:authzdb          # authzdb.New(pool) — grants table querier
      - infra:opReg               # *authzapi.OperationRegistry — constructed above
      - infra:pool               # *pgxpool.Pool — wildcard-grant check

  # smtp — SMTP email sender used by auth handlers (registration, email-code,
  # password-reset). Reads SMTP_HOST, SMTP_PORT, SMTP_FROM, SMTP_USER, SMTP_PASS.
  #
  # TODO: emailSender source module is unresolved. In main.go, email.NewSMTPSender
  # is constructed directly in users-module and injected into authHandler. The
  # users-module manifest's requires.services lists emailSender as an unresolved
  # cross-module dependency. Until a dedicated email-module is introduced, the smtp
  # infra singleton acts as the concrete provider and is referenced via infra:smtp
  # in the generated wiring. The app manifest must declare it here explicitly.
  smtp:
    type: "*email.SMTPSender"
    constructor: email.NewSMTPSender
    args:
      - field:cfg.SMTP.Host   # SMTP_HOST
      - field:cfg.SMTP.Port   # SMTP_PORT
      - field:cfg.SMTP.From   # SMTP_FROM
      - field:cfg.SMTP.User   # SMTP_USER
      - field:cfg.SMTP.Pass   # SMTP_PASS

# ============================================================
# Observer group — ordered list of observers composed into the
# app's ObserverGroup. The compiler assembles these from all
# selected modules' provides.observers entries in declaration order.
#
# Order matters: auditObserver runs first so audit writes happen
# inside the operation's transaction before any fallback fires.
# ============================================================

observerGroup:
  # 1. audit-module auditObserver — writes audit_log rows in-tx.
  #    policy: propagate — audit failures abort and roll back the operation.
  - module: audit
    name: auditLog

  # 2. core-module noopObserver — sentinel/fallback.
  #    policy: swallow — never produces errors; no-op for unobserved events.
  - module: core
    name: noopSentinel

# ============================================================
# Routing — four scope tiers, outer to inner.
# The compiler emits the router mount block from this section.
# ============================================================

routing:
  # Tier 1: health endpoints — no authentication, no middleware.
  # /healthz and /readyz are served unconditionally.
  - name: healthz
    paths:
      - GET /healthz
      - GET /readyz
    scope: public
    middleware: []

  # Tier 2: OIDC onboarding endpoints — no bearer-auth required.
  # Mounted only when TOKEN_DISPLAY != none. When TOKEN_DISPLAY=none,
  # the server exits on unconfirmed state before reaching this mount.
  #
  # TODO(phase-3/002-extract-oidc-config-routes): handlers.RegisterOIDCConfigRoutes
  # does not yet exist. This route group is currently wired inline in main.go
  # via r.Route("/v1/oidc-config", ...). After phase-3/002 extraction, add:
  #   register: handlers.RegisterOIDCConfigRoutes
  - name: oidcConfig
    prefix: /v1/oidc-config
    scope: public
    condition: "cfg.Onboarding.TokenDisplay != config.TokenDisplayNone"
    middleware: []
    # register: handlers.RegisterOIDCConfigRoutes  # TODO(phase-3/002): not yet extracted
    module: users
    handler: onboardingHandler

  # Tier 3: local auth and OIDC callback endpoints.
  # RequireOIDCConfirmed is the only gate — bearer token is NOT required.
  # These endpoints are how a user obtains a bearer token.
  #
  # TODO(phase-3/001-extract-auth-routes): authhandlers.RegisterRoutes does not
  # yet exist. Currently wired inline in main.go via r.Route("/v1/auth", ...).
  # After phase-3/001 extraction, add:
  #   register: authhandlers.RegisterRoutes
  - name: auth
    prefix: /v1/auth
    scope: public
    middleware:
      - users.requireOIDCConfirmed
    # register: authhandlers.RegisterRoutes  # TODO(phase-3/001): not yet extracted
    module: users
    handler: authHandler

  # Tier 4: GET /v1/self — authenticated but NOT verified.
  # RequireAuth is applied but RequireVerifiedEmail is intentionally absent.
  # This allows unverified accounts to fetch their own profile so the GUI
  # can render the "verify your email" page.
  - name: selfRead
    prefix: GET /v1/self
    scope: authenticated
    middleware:
      - users.requireOIDCConfirmed
      - users.requireAuth

  # Tier 5: all remaining /v1 routes — authenticated + verified.
  # This is the default scope gate: requireOIDCConfirmed + requireAuth +
  # requireVerifiedEmail. Includes user-accounts, apps, identities,
  # core entity CRUD, audit, authz management, assume, and providers.
  #
  # TODO(phase-3/003-extract-account-routes): handlers.RegisterAccountRoutes does
  # not yet exist. Currently wired inline in main.go via r.Route("/v1", ...) with
  # nested r.Group blocks. After phase-3/003 extraction, the generated main.go
  # will call handlers.RegisterAccountRoutes(r, usersHandler, ...) inside this scope.
  - name: default
    prefix: /v1
    scope: verified
    middleware:
      - users.requireOIDCConfirmed
      - users.requireAuth
      - users.requireVerifiedEmail

# ============================================================
# Hooks — app-level lifecycle callbacks.
# ============================================================

hooks:
  # firstUserGrant — bootstraps the wildcard manage grant for the very first
  # user account created. When entityID N is the first account, this hook
  # calls authzSvcs.Grant.CreateWildcardGrant(ctx, entityUUID, "manage"),
  # making the user a super-admin via the grants table.
  #
  # The hook is currently an inline closure in main.go (lines 381–390).
  # It depends on coredb.New(pool) and authzSvcs.Grant (GrantServicer from
  # authz-module). It is registered on both authHandler and userResolver via
  # SetFirstUserHook().
  #
  # TODO(phase-3/004-extract-first-user-hook): Extract this closure to an
  # exported function (candidate: users.NewFirstUserHook or handlers.WireFirstUserHook)
  # so the compiler can reference it as a symbol. After extraction, uncomment:
  #   symbol: handlers.WireFirstUserHook
  firstUserGrant:
    # symbol: handlers.WireFirstUserHook  # TODO(phase-3/004): function not yet extracted
    requires:
      - service:grantService    # GrantServicer from authz-module (authzSvcs.Grant)
    registeredOn:
      - method:authHandler.SetFirstUserHook
      - method:userResolver.SetFirstUserHook

  # grantAdminFn — inline closure that creates a wildcard manage grant for a
  # named user account, after verifying the actor has a wildcard manage grant.
  # Injected into usersHandler as a handlers.GrantAdminFn.
  #
  # NOTE: grantAdminFn and revokeAdminFn are composition-root closures that
  # close over az (Authorizer), db.New(pool) (users queries), coredb.New(pool)
  # (entity queries), and authzSvcs.Grant. They are NOT extractable as module
  # services in their current form because they capture pool-backed query objects
  # as closed-over values. Compiler design for inline closures at the composition
  # root is deferred to phase-4. Until then, these remain hand-wired in main.go.
  #
  # TODO(phase-4): Determine compiler representation for composition-root closures
  # of type handlers.GrantAdminFn. Options include a dedicated arg-source form
  # (e.g. closure:) or extraction to module-provided factory functions.
  grantAdminFn:
    # inline closure — see main.go lines 412–426
    # TODO(phase-4): not representable as a module service or symbol today
    note: "inline closure; depends on az, db.New(pool), coredb.New(pool), authzSvcs.Grant"

  revokeAdminFn:
    # inline closure — see main.go lines 431–443
    # TODO(phase-4): not representable as a module service or symbol today
    note: "inline closure; depends on az, db.New(pool), coredb.New(pool), authzSvcs.Grant"
