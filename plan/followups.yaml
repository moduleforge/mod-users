    - title: The task agent dispatch for this task hit two
      id: h4Un
      date: "2026-07-03"
      tag: stale-artifact-cleanup
      text: '[phase-02-stale-artifact-cleanup/001-remove-nextjs-scaffold.md] The task agent dispatch for this task hit two consecutive infrastructure failures (API connection error, then a stall) after completing the substantive work. No content issue — purely infra flakiness. Noting for awareness in case this recurs on later phases.'
    - title: Worktree isolation misses untracked cleanup
      id: de6E
      date: "2026-07-03"
      tag: phase-02-gate
      text: 'Discovered during the phase-02 gate review: when a task''s Requirements call for removing untracked/stray filesystem artifacts (not git-tracked), dispatching that task into an isolated task worktree does not work as expected — `git worktree add` doesn''t copy untracked files from the main checkout, so the fresh task worktree never contains the stray artifacts in the first place, and the task agent''s rm -rf + verification silently checks an already-clean location rather than actually cleaning the project root. This happened in phase-02-stale-artifact-cleanup/001-remove-nextjs-scaffold.md''s Requirement 3 (stray empty dirs + gui/.next/ build cache) — caught by the style review lens, fixed directly by the manager against the actual project root. Future plan tasks that include untracked-file/stray-directory cleanup should either target project_root directly (bypassing worktree isolation for that step) or have the manager independently re-verify against project_root after merge, not just trust the task worktree''s self-reported validation.'
    - title: The AGENTS.md pointer to make preview documen
      id: 5arF
      date: "2026-07-03"
      tag: dev-stack-disposition
      text: '[phase-03-dev-stack-disposition/001-remove-gui-compose-service.md] The AGENTS.md pointer to make preview documents a target that does not exist yet in this task branch in isolation (added by Phase 05, not yet run in this lineage). Intentional forward-reference per the task doc''s own note; flagging so the manager confirms merge/phase sequencing doesn''t leave an inconsistent intermediate state if branches are inspected individually before Phase 05 lands.'
    - title: 'deploy/local/README.md stale re: gui compose'
      id: S74e
      date: "2026-07-03"
      tag: phase-03-gate
      text: 'Incidental observation from the phase-03 gate review (correctness lens): deploy/local/README.md''s "## What''s not here" section still contains phase-3-era prose ("API and GUI containers — they run on the host during development (Phase 3+ may add them to compose)") that is now doubly stale given the compose gui service existed and was just removed by phase-03. Untouched by phase-03''s diff and not in that task''s files_in_scope. Not currently owned by any registered plan phase (Phase 06 doc-updates covers docs/architecture.md and docs/project-structure.md, not deploy/local/README.md) — worth a follow-up wording pass if the manager wants full accuracy.'
    - title: Pre-existing, package-manager-independent lim
      id: VqCM
      date: "2026-07-03"
      tag: ci-bun-migration
      text: '[phase-04-ci-bun-migration/001-migrate-ci-to-bun.md] Pre-existing, package-manager-independent limitation confirmed live: make build.gui''s tsup --dts step fails with Cannot find module ''@moduleforge/core-gui'' in any environment (including CI) where .yalc/ is not populated, since gui/src still imports the package directly. Out of this task''s scope (only cleared the pnpm/bun mismatch) — manager should track a follow-up for resolving @moduleforge/core-gui types in CI (publish/link the package, or scope build.gui out of the CI build job).'
